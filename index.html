<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BLOCK BLAST by temaprikolov</title>
<style>
  :root{
    --bg-0:#0a0a10;
    --accent:#8b5cf6;
    --accent-2:#22d3ee;
    --text:#e9e9f2;
    --text-dim:#8a8aa0;
    --line: rgba(255,255,255,0.08);
  }

  *{ box-sizing:border-box; }

  html,body{
    margin:0; padding:0;
    min-height:100%;
    background:
      radial-gradient(1200px 800px at 18% -10%, rgba(139,92,246,0.16), transparent 55%),
      radial-gradient(1000px 700px at 100% 110%, rgba(34,211,238,0.13), transparent 55%),
      var(--bg-0);
    color:var(--text);
    font-family:"Segoe UI", Inter, system-ui, -apple-system, Arial, sans-serif;
  }

  .page{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:48px 20px 64px;
    text-align:center;
  }

  .logo-frame{
    width:104px;
    height:104px;
    border-radius:24px;
    overflow:hidden;
    border:1px solid var(--line);
    box-shadow: 0 0 0 1px rgba(255,255,255,0.02), 0 20px 60px -20px rgba(139,92,246,0.55);
    animation: glow 4.5s ease-in-out infinite;
  }
  .logo-frame img{ width:100%; height:100%; display:block; object-fit:cover; }

  @keyframes glow{
    0%, 100%{ box-shadow: 0 0 0 1px rgba(255,255,255,0.02), 0 20px 60px -20px rgba(139,92,246,0.55); }
    50%{ box-shadow: 0 0 0 1px rgba(255,255,255,0.03), 0 26px 80px -16px rgba(34,211,238,0.55); }
  }
  @media (prefers-reduced-motion: reduce){
    .logo-frame{ animation:none; }
  }

  .title{
    margin:26px 0 6px;
    font-size:clamp(40px, 8vw, 64px);
    font-weight:900;
    letter-spacing:3px;
    background:linear-gradient(90deg, var(--accent-2), var(--accent));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    text-shadow: 0 4px 32px rgba(139,92,246,0.35);
  }

  .subtitle{
    font-size:14px;
    letter-spacing:4px;
    text-transform:uppercase;
    color:var(--text-dim);
  }

  .spacer{ height:11vh; }

  .download-btn{
    display:inline-flex;
    align-items:center;
    gap:10px;
    padding:18px 40px;
    border-radius:16px;
    background:linear-gradient(90deg, var(--accent), var(--accent-2));
    color:#0a0a10;
    font-size:18px;
    font-weight:800;
    letter-spacing:0.5px;
    text-decoration:none;
    box-shadow: 0 16px 40px -12px rgba(139,92,246,0.55);
    transition: transform .15s ease, box-shadow .15s ease;
  }
  .download-btn:hover{ transform:translateY(-2px); box-shadow: 0 20px 50px -12px rgba(34,211,238,0.55); }
  .download-btn:active{ transform:translateY(0); }
  .download-btn svg{ width:20px; height:20px; }

  .file-caption{
    margin-top:12px;
    font-size:12px;
    color:var(--text-dim);
    letter-spacing:0.5px;
  }

  .telegram-btn{
    margin-top:28px;
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding:10px 22px;
    border-radius:12px;
    border:1px solid rgba(34,158,217,0.35);
    color:#5eb8e8;
    font-size:13px;
    font-weight:600;
    text-decoration:none;
    transition: color .15s ease, border-color .15s ease, background .15s ease;
  }
  .telegram-btn:hover{ color:#8fd0f5; border-color:#5eb8e8; background:rgba(34,158,217,0.10); }
  .telegram-btn svg{ width:15px; height:15px; }
</style>
</head>
<body>
  <div class="page">
    <div class="logo-frame">
      <img src="logo.jpg" alt="BLOCK BLAST logo">
    </div>

    <div class="title">BLOCK BLAST</div>
    <div class="subtitle">by temaprikolov</div>

    <div class="spacer"></div>

    <a class="download-btn" href="BlockBlast_temaprikolov_ver_Setup.exe" download>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"/><path d="M7 10l5 5 5-5"/><path d="M5 21h14"/></svg>
      Скачать игру
    </a>
    <div class="file-caption">Windows · .exe · 43 МБ</div>

    <a class="telegram-btn" href="https://t.me/temaprikolovv" target="_blank" rel="noopener">
      <svg viewBox="0 0 240 240" fill="currentColor"><path d="M120 0a120 120 0 1 0 0 240 120 120 0 0 0 0-240Zm55.6 81.6-19 89.6c-1.4 6.4-5.2 8-10.6 5l-29.4-21.7-14.2 13.7c-1.6 1.6-2.9 2.9-5.9 2.9l2.1-30 54.8-49.5c2.4-2.1-.5-3.3-3.7-1.2l-67.7 42.6-29.2-9.1c-6.3-2-6.5-6.3 1.4-9.3l114.3-44c5.3-1.9 9.9 1.3 8.1 9.3Z"/></svg>
      Telegram
    </a>
  </div>
</body>
</html>
